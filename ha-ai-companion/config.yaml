name: "HA AI Companion"
version: "1.18.1"
slug: "ha-ai-companion"
description: "AI-powered Home Assistant companion — manage config, dashboards, automations and memory via natural language"
url: "https://github.com/krystiankolota/ha-ai-companion"
arch:
  - aarch64
  - i386
  - amd64
  - armhf
  - armv7

# Startup configuration
init: false
startup: application
boot: auto
watchdog: "tcp://[HOST]:[PORT:8099]"

# Ingress configuration (provides security and authentication)
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-outline
panel_title: "AI Companion"

# Volume mappings - CRITICAL for config access
map:
  - type: homeassistant_config
    read_only: false
  - type: addon_config
    read_only: false
  - type: backup
    read_only: false

# API access
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true

# Security
apparmor: true
privileged: []

# User-configurable options
options:
  # ── Main model (used for everything unless a layer overrides it) ──
  openai_api_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  openai_api_key: ""
  openai_model: "gemini-2.5-flash"
  # ── Research layer (cheaper: reading/exploring, suggestions). Blank = use main. ──
  research_model: ""
  research_api_url: ""
  research_api_key: ""
  # ── Reasoning layer (stronger: planning, writing changes). Blank = use main. ──
  reasoning_model: ""
  reasoning_api_url: ""
  reasoning_api_key: ""
  # ── Behaviour ──
  log_level: "info"
  temperature: ""
  enable_cache_control: false
  max_iterations: 0
  # ── Usage / cost ──
  usage_tracking: "stream_options"
  research_usage_tracking: "default"
  reasoning_usage_tracking: "default"
  input_price_per_1m: 0.0
  output_price_per_1m: 0.0
  # ── Suggestions feature ──
  suggestion_prompt: ""
  # ── Node-RED ──
  nodered_url: ""
  nodered_token: ""
  nodered_flows_file: ""
  # ── Advanced ──
  system_prompt_file: ""

schema:
  openai_api_url: url
  openai_api_key: password?
  openai_model: str
  research_model: str?
  research_api_url: str?
  research_api_key: str?
  reasoning_model: str?
  reasoning_api_url: str?
  reasoning_api_key: str?
  log_level: list(debug|info|warning|error)
  temperature: str?
  enable_cache_control: bool
  max_iterations: int?
  usage_tracking: list(stream_options|usage|disabled)
  research_usage_tracking: list(default|stream_options|usage|disabled)?
  reasoning_usage_tracking: list(default|stream_options|usage|disabled)?
  input_price_per_1m: float?
  output_price_per_1m: float?
  suggestion_prompt: str?
  nodered_url: str?
  nodered_token: str?
  nodered_flows_file: str?
  system_prompt_file: str?
