name: "HA AI Companion"
version: "0.2.7"
slug: "ha-ai-companion"
description: "AI-powered Home Assistant companion — manage config, dashboards, automations and memory via natural language"
url: "https://github.com/krystiankolota/ha-ai-companion"
arch:
  - aarch64
  - i386
  - amd64
  - armhf
  - armv7

# Startup configuration
init: false
startup: application
boot: auto
watchdog: "tcp://[HOST]:[PORT:8099]"

# Ingress configuration (provides security and authentication)
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-outline
panel_title: "AI Companion"

# Volume mappings - CRITICAL for config access
map:
  - type: homeassistant_config
    read_only: false
  - type: addon_config
    read_only: false
  - type: backup
    read_only: false

# API access
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true

# Security
apparmor: true
privileged: []

# User-configurable options
options:
  openai_api_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  openai_api_key: ""
  openai_model: "gemini-2.5-flash"
  log_level: "info"
  system_prompt_file: ""
  temperature: ""
  enable_cache_control: false
  usage_tracking: "stream_options"
  suggestion_model: ""
  suggestion_api_url: ""
  suggestion_api_key: ""
  config_model: ""
  config_api_url: ""
  config_api_key: ""
  suggestion_prompt: ""
  nodered_url: ""
  nodered_token: ""
  nodered_flows_file: ""

schema:
  openai_api_url: url
  openai_api_key: password?
  openai_model: str
  log_level: list(debug|info|warning|error)
  system_prompt_file: str?
  temperature: str?
  enable_cache_control: bool
  usage_tracking: list(stream_options|usage|disabled)
  suggestion_model: str?
  suggestion_api_url: str?
  suggestion_api_key: str?
  config_model: str?
  config_api_url: str?
  config_api_key: str?
  suggestion_prompt: str?
  nodered_url: str?
  nodered_token: str?
  nodered_flows_file: str?
