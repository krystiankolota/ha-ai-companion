<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA AI Companion</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/css/diff2html.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.47/bundles/js/diff2html-ui.min.js"></script>
</head>
<body>
    <div class="app-wrapper">

        <!-- Backdrop for mobile sidebar -->
        <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

        <!-- Sessions sidebar -->
        <aside class="sessions-panel" id="sessionsPanel">
            <div class="sessions-panel-header">
                <span class="sessions-panel-title">Conversations</span>
                <button id="newChatBtn" class="btn btn-new-chat" title="Start new conversation">+ New</button>
            </div>
            <div id="sessionsList" class="sessions-list">
                <div class="sessions-loading">Loading...</div>
            </div>
        </aside>

        <!-- Main content -->
        <div class="main-content">
            <div class="container">
                <header>
                    <button id="sidebarToggleBtn" class="btn btn-icon sidebar-toggle" title="Toggle conversations">☰</button>
                    <h1><img src="static/images/icon.png" width="40" height="40"/> <span class="header-title">HA AI Companion</span></h1>
                    <div class="header-actions">
                        <span class="version-badge">{{ version }}</span>
                    </div>
                </header>

                <!-- Tab navigation -->
                <nav class="tab-nav">
                    <button class="tab-btn active" data-tab="chat">Chat</button>
                    <button class="tab-btn" data-tab="suggestions">Suggestions</button>
                </nav>

                <main>
                    <!-- Chat tab -->
                    <div class="tab-panel active" id="tab-chat">
                        <div class="chat-container">
                            <div id="chatMessages" class="chat-messages">
                                <!-- Messages will be added here dynamically -->
                            </div>

                            <!-- Diff Viewer Modal -->
                            <div id="diffModal" class="modal" style="display: none;">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h3>📝 Proposed Changes</h3>
                                        <button class="modal-close" onclick="closeDiffModal()">&times;</button>
                                    </div>
                                    <div class="modal-body" id="diffContent">
                                        <!-- Diff content will be inserted here -->
                                    </div>
                                    <div class="modal-footer">
                                        <button class="btn btn-success" onclick="approvePendingChanges()">✓ Approve & Apply</button>
                                        <button class="btn btn-danger" onclick="rejectPendingChanges()">✗ Reject</button>
                                        <button class="btn btn-secondary" onclick="closeDiffModal()">Cancel</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Input Area -->
                            <div class="chat-input-area">
                                <textarea
                                    id="messageInput"
                                    class="chat-input"
                                    placeholder="Ask me anything about your Home Assistant configuration..."
                                    rows="3"
                                ></textarea>
                                <button id="sendBtn" class="btn btn-primary">Send</button>
                            </div>
                        </div>
                    </div>

                    <!-- Suggestions tab -->
                    <div class="tab-panel" id="tab-suggestions">
                        <div class="suggestions-container">
                            <div class="suggestions-toolbar">
                                <p class="suggestions-intro">AI-generated automation ideas based on your devices and existing automations.</p>
                                <textarea id="suggestionFocusInput" class="suggestion-focus-input" rows="2" placeholder="Optional: focus area (e.g. 'focus on bedroom lights and energy saving')"></textarea>
                                <button id="generateSuggestionsBtn" class="btn btn-primary">Generate suggestions</button>
                            </div>
                            <div id="suggestionsStatus" class="suggestions-status" style="display:none;"></div>
                            <div id="suggestionsList" class="suggestions-list"></div>
                        </div>
                    </div>
                </main>

                <footer>
                    <p class="footer-label">HA AI Companion</p>
                    <div class="footer-stats">
                        <span id="sessionCost" class="footer-cost" style="display: none;" title="Estimated session cost"></span>
                        <div id="tokenCounter" class="footer-token-stats" style="display: none;">
                            <span class="token-counter-icon">📊</span>
                            <span class="token-counter-breakdown">
                                <span class="token-counter-input" id="tokenCounterInput" title="Input tokens">↓0</span>
                                <span class="token-counter-output" id="tokenCounterOutput" title="Output tokens">↑0</span>
                                <span class="token-counter-cached" id="tokenCounterCached" title="Cached tokens" style="display: none;">💾0</span>
                            </span>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script src="static/js/websocket-chat.js"></script>
    <script src="static/js/app.js"></script>
    <script src="static/js/suggestions.js"></script>
    <script>
        // Use WebSocket instead of SSE to avoid Ingress buffering
        if (typeof sendMessageWebSocket !== 'undefined') {
            console.log('Using WebSocket mode for real-time streaming');
            sendMessage = sendMessageWebSocket;
        }
    </script>
</body>
</html>
